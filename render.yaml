services:
  - type: web
    name: auto-assignment-corrector
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GOOGLE_OAUTH_CLIENT_JSON
        sync: false
